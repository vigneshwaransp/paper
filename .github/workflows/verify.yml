name: Build & Verify

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Verify build script
      run: npm run build
      env:
        FRIDAY_API_KEY: "placeholder-key"
        FRIDAY_NVIDIA_API_KEY: "placeholder-key"
        FRIDAY_MISTRAL_API_KEY: "placeholder-key"
        FRIDAY_DB_KEY: "placeholder-key"
